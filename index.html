<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeSurfer</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at top, #1f2937, #020617 65%);
        color: #e5e7eb;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid #334155;
        background: rgba(2, 6, 23, 0.78);
        border-radius: 8px;
        backdrop-filter: blur(6px);
        width: min(520px, calc(100vw - 24px));
      }

      #hud.compact {
        width: auto;
        max-width: 320px;
      }

      #hud.compact #perf,
      #hud.compact #debug,
      #hud.compact #settings {
        display: none;
      }

      #hud-row,
      #stats,
      #perf,
      #settings {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      #judgment {
        position: fixed;
        left: 50%;
        top: 22%;
        transform: translate(-50%, -50%);
        z-index: 15;
        font-size: clamp(28px, 5vw, 52px);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #f8fafc;
        text-shadow: 0 0 16px #38bdf8;
        opacity: 0;
        transition: opacity 120ms linear;
        pointer-events: none;
      }

      #judgment.show {
        opacity: 1;
      }

      #result {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 11;
        padding: 12px;
        border: 1px solid #334155;
        background: rgba(2, 6, 23, 0.82);
        border-radius: 8px;
        width: min(300px, calc(100vw - 24px));
        display: none;
        gap: 6px;
      }

      #result.show {
        display: grid;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        padding: 8px 10px;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #0f172a;
        color: inherit;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      input[type="range"] {
        width: 140px;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <label>
        Load song:
        <input id="audio-file" type="file" accept="audio/*" />
      </label>
      <div id="hud-row">
        <button id="play-button" disabled>Play</button>
        <button id="compact-toggle" type="button">Compact HUD</button>
        <label>
          Difficulty
          <select id="difficulty">
            <option value="chill">Chill</option>
            <option value="normal" selected>Normal</option>
            <option value="hyper">Hyper</option>
          </select>
        </label>
        <label>
          Sync
          <input id="timing-offset" type="range" min="-120" max="120" step="1" value="0" />
          <span id="timing-offset-label">0ms</span>
        </label>
      </div>
      <div id="stats">
        <span id="score">Score: 0</span>
        <span id="combo">Combo: 0</span>
        <span id="max-combo">Max Combo: 0</span>
        <span id="fever">Fever: 0%</span>
      </div>
      <div id="perf">
        <span id="accuracy">Accuracy: 0.0%</span>
        <span id="breakdown">P:0 G:0 g:0 M:0</span>
      </div>
      <div id="settings">
        <label>
          Quality
          <select id="quality-mode">
            <option value="auto" selected>Auto</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <label>
          FX
          <input id="fx-intensity" type="range" min="30" max="200" step="1" value="100" />
          <span id="fx-intensity-label">100%</span>
        </label>
        <label>
          Lane Assist
          <input id="lane-tolerance" type="range" min="30" max="120" step="1" value="55" />
          <span id="lane-tolerance-label">55%</span>
        </label>
      </div>
      <div id="debug">Playing: false Pending: 0 Active: 0 Progress: 0%</div>
    </div>

    <div id="judgment"></div>

    <div id="result">
      <strong>Song Complete</strong>
      <span id="result-score">Score: 0</span>
      <span id="result-medal">Medal: -</span>
      <span id="result-personal-best">Personal Best: 0</span>
      <span id="result-accuracy">Accuracy: 0.0%</span>
      <span id="result-max-combo">Max Combo: 0</span>
      <span id="result-breakdown">P:0 G:0 g:0 M:0</span>
      <span id="result-types">Tap:0 Hold:0 Slide:0 Double:0 Mines:0</span>
      <span id="result-tech">Hold C/B:0/0 Slide C/B:0/0</span>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
